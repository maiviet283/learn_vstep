{% extends 'learning/base.html' %}
{% block title %}Đăng nhập – VSTEP Master{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card p-4">
    <h1 class="h4 fw-bold mb-3"><i class="bi bi-person-circle me-1"></i>Đăng nhập</h1>
    {% if form.errors %}<div class="alert alert-danger py-2 small">Tên đăng nhập hoặc mật khẩu không đúng.</div>{% endif %}
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label">Tên đăng nhập</label>
        <input type="text" name="username" class="form-control" required autofocus></div>
      <div class="mb-3"><label class="form-label">Mật khẩu</label>
        <input type="password" name="password" class="form-control" required></div>
      <button class="btn btn-brand w-100">Đăng nhập</button>
    </form>
    <p class="small text-center mt-3 mb-0">Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký miễn phí</a></p>
  </div>
</div></div>
{% endblock %}
